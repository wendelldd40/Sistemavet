<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vetória · Gestão Veterinária</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0F2E29; --ink-2:#3A5751; --muted:#7D938D;
  --brand:#12876C; --brand-600:#0E6E58; --brand-700:#0B5746;
  --brand-soft:#E2F1EC; --brand-tint:#F1F8F5;
  --accent:#FF7A59; --accent-600:#F0613D; --accent-soft:#FFE9E2;
  --gold:#EFA42F; --gold-soft:#FCEFD6;
  --danger:#E5544B; --danger-soft:#FBE4E2;
  --info:#3E8BD6; --info-soft:#E3EFFA;
  --ok:#1FA971; --ok-soft:#DBF3E8;
  --purple:#7C6BD8; --purple-soft:#EAE6FA;
  --bg:#EEF3F0; --surface:#FFFFFF; --surface-2:#F7FAF8;
  --line:#E1EAE6; --line-2:#EDF2EF;
  --shadow-sm:0 1px 2px rgba(15,46,41,.06);
  --shadow:0 4px 16px rgba(15,46,41,.07);
  --shadow-lg:0 16px 44px rgba(15,46,41,.14);
  --r:14px; --r-sm:10px; --r-lg:20px;
  --sidebar:248px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;line-height:1.5}
h1,h2,h3,h4,.dsp{font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:-.02em}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
a{color:inherit;text-decoration:none}
.muted{color:var(--muted)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#cdd9d4;border-radius:20px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:#b4c4bd}

/* ---------- App shell ---------- */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);flex-shrink:0;background:linear-gradient(180deg,#0F2E29,#103D33);color:#DCEAE5;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50;transition:transform .25s ease}
.sb-brand{display:flex;align-items:center;gap:11px;padding:20px 20px 16px}
.sb-brand .mark{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--brand),#1AB38C);display:grid;place-items:center;box-shadow:0 6px 16px rgba(18,135,108,.4);flex-shrink:0}
.sb-brand .mark svg{width:24px;height:24px}
.sb-brand .nm{line-height:1.05}
.sb-brand .nm b{font-family:'Plus Jakarta Sans';font-weight:800;font-size:20px;color:#fff;display:block;letter-spacing:-.02em}
.sb-brand .nm span{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#7FB3A4;font-weight:600}
.sb-scroll{flex:1;overflow-y:auto;padding:6px 12px 12px}
.sb-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-color:transparent}
.sb-group{margin:14px 8px 6px;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;color:#5E8A7D;font-weight:700}
.sb-link{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;color:#B9D2CB;font-weight:600;font-size:13.5px;transition:.13s;position:relative;width:100%;text-align:left}
.sb-link svg{width:19px;height:19px;flex-shrink:0;opacity:.85}
.sb-link:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-link.active{background:linear-gradient(100deg,rgba(18,135,108,.9),rgba(26,179,140,.55));color:#fff;box-shadow:0 4px 14px rgba(0,0,0,.18)}
.sb-link.active svg{opacity:1}
.sb-link .badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:20px;min-width:18px;text-align:center}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:11px;transition:.13s;width:100%}
.sb-user:hover{background:rgba(255,255,255,.07)}
.sb-user .av{width:34px;height:34px;border-radius:10px;background:var(--brand);display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.sb-user .nm{line-height:1.2;text-align:left;overflow:hidden}
.sb-user .nm b{display:block;font-size:13px;color:#fff;font-weight:700;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
.sb-user .nm span{font-size:11px;color:#7FB3A4}

.main{flex:1;margin-left:var(--sidebar);min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:30;background:rgba(238,243,240,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:12px 28px;display:flex;align-items:center;gap:16px}
.hamb{display:none;width:38px;height:38px;border-radius:10px;background:var(--surface);border:1px solid var(--line);place-items:center}
.hamb svg{width:20px;height:20px}
.search{flex:1;max-width:420px;position:relative}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted)}
.search input{width:100%;padding:10px 14px 10px 38px;border-radius:12px;border:1px solid var(--line);background:var(--surface);outline:none;transition:.15s}
.search input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.topbar .sp{flex:1}
.tb-btn{width:40px;height:40px;border-radius:11px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;position:relative;transition:.15s}
.tb-btn:hover{border-color:var(--brand);color:var(--brand)}
.tb-btn svg{width:19px;height:19px}
.tb-btn .dot{position:absolute;top:9px;right:9px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--surface)}
.content{padding:24px 28px 64px;max-width:1480px;width:100%}

/* ---------- Page head ---------- */
.phead{display:flex;align-items:flex-end;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.phead .tt h1{font-size:26px;font-weight:800}
.phead .tt p{color:var(--muted);font-size:13.5px;margin-top:2px}
.phead .sp{flex:1}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 17px;border-radius:12px;font-weight:700;font-size:13.5px;transition:.15s;white-space:nowrap;border:1px solid transparent}
.btn svg{width:17px;height:17px}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 4px 14px rgba(18,135,108,.28)}
.btn-primary:hover{background:var(--brand-600);transform:translateY(-1px);box-shadow:0 6px 18px rgba(18,135,108,.34)}
.btn-accent{background:var(--accent);color:#fff;box-shadow:0 4px 14px rgba(255,122,89,.3)}
.btn-accent:hover{background:var(--accent-600);transform:translateY(-1px)}
.btn-ghost{background:var(--surface);color:var(--ink-2);border-color:var(--line)}
.btn-ghost:hover{border-color:var(--brand);color:var(--brand)}
.btn-soft{background:var(--brand-soft);color:var(--brand-700)}
.btn-soft:hover{background:#d4ebe3}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
.btn-sm svg{width:15px;height:15px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{filter:brightness(.94)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ---------- Cards ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.card-pad{padding:20px}
.card-head{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid var(--line-2)}
.card-head h3{font-size:15.5px;font-weight:700}
.card-head .sp{flex:1}
.grid{display:grid;gap:18px}

/* KPI cards */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 18px 16px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.kpi .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;margin-bottom:14px}
.kpi .ic svg{width:21px;height:21px}
.kpi .lb{font-size:12.5px;color:var(--muted);font-weight:600}
.kpi .vl{font-family:'Plus Jakarta Sans';font-size:25px;font-weight:800;margin-top:3px;letter-spacing:-.02em}
.kpi .tr{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;margin-top:7px;padding:2px 8px;border-radius:20px}
.tr.up{background:var(--ok-soft);color:var(--ok)} .tr.down{background:var(--danger-soft);color:var(--danger)}
.ic.teal{background:var(--brand-soft);color:var(--brand)} .ic.coral{background:var(--accent-soft);color:var(--accent-600)}
.ic.gold{background:var(--gold-soft);color:var(--gold)} .ic.info{background:var(--info-soft);color:var(--info)}
.ic.purple{background:var(--purple-soft);color:var(--purple)} .ic.ok{background:var(--ok-soft);color:var(--ok)}
.ic.danger{background:var(--danger-soft);color:var(--danger)}

/* ---------- Badges / chips ---------- */
.badge2{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap}
.badge2 .d{width:6px;height:6px;border-radius:50%}
.chip{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:20px;font-weight:600;font-size:13px;background:var(--surface);border:1px solid var(--line);color:var(--ink-2);transition:.13s;white-space:nowrap}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip .ct{background:rgba(0,0,0,.08);padding:0 7px;border-radius:20px;font-size:11.5px}
.chip.active .ct{background:rgba(255,255,255,.2)}
.chiprow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}

/* ---------- Tables ---------- */
.tbl-wrap{overflow-x:auto;border-radius:var(--r)}
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;padding:12px 16px;font-size:11.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--line);white-space:nowrap}
.tbl td{padding:13px 16px;border-bottom:1px solid var(--line-2);vertical-align:middle}
.tbl tbody tr{transition:.1s} .tbl tbody tr:hover{background:var(--surface-2)}
.tbl tbody tr:last-child td{border-bottom:none}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.t-main{font-weight:700;color:var(--ink)}
.t-sub{font-size:12px;color:var(--muted)}

/* avatars / pet pills */
.av-pet{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0;background:var(--brand-tint)}
.cellflex{display:flex;align-items:center;gap:11px}

/* ---------- Forms ---------- */
.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.field label .req{color:var(--accent)}
.inp,.sel,textarea.inp{width:100%;padding:11px 13px;border-radius:11px;border:1px solid var(--line);background:var(--surface);outline:none;transition:.15s}
.inp:focus,.sel:focus,textarea.inp:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
textarea.inp{resize:vertical;min-height:78px;line-height:1.55}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.frow-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
.seg button{padding:7px 14px;border-radius:8px;font-weight:600;font-size:13px;color:var(--muted);transition:.13s}
.seg button.active{background:var(--surface);color:var(--brand);box-shadow:var(--shadow-sm);font-weight:700}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(15,46,41,.5);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;animation:ov .2s ease}
@keyframes ov{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:560px;animation:mp .26s cubic-bezier(.2,.8,.25,1);overflow:hidden;margin:auto}
@keyframes mp{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
.modal.wide{max-width:880px} .modal.xwide{max-width:1080px}
.mhead{display:flex;align-items:center;gap:12px;padding:20px 24px;border-bottom:1px solid var(--line-2)}
.mhead h3{font-size:18px;font-weight:800;flex:1}
.mhead .x{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--muted);transition:.13s}
.mhead .x:hover{background:var(--surface-2);color:var(--ink)}
.mbody{padding:22px 24px;max-height:66vh;overflow-y:auto}
.mfoot{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--line-2);background:var(--surface-2)}

/* ---------- Toast ---------- */
.toasts{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:11px;background:var(--ink);color:#fff;padding:13px 17px;border-radius:13px;box-shadow:var(--shadow-lg);font-weight:600;font-size:13.5px;animation:tin .3s ease;max-width:340px}
@keyframes tin{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
.toast .ti{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;flex-shrink:0}
.toast.ok .ti{background:var(--ok)} .toast.err .ti{background:var(--danger)} .toast.info .ti{background:var(--brand)}
.toast svg{width:14px;height:14px}

/* ---------- Misc ---------- */
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty .ei{width:60px;height:60px;border-radius:18px;background:var(--brand-tint);display:grid;place-items:center;margin:0 auto 14px}
.empty .ei svg{width:28px;height:28px;color:var(--brand)}
.empty h4{font-size:16px;color:var(--ink);margin-bottom:5px}
.divider{height:1px;background:var(--line);margin:18px 0}
.tag{display:inline-block;padding:2px 9px;border-radius:7px;font-size:11.5px;font-weight:600;background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line)}
.prog{height:7px;background:var(--line);border-radius:20px;overflow:hidden}
.prog>i{display:block;height:100%;border-radius:20px;background:var(--brand)}
.cols-2{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
.cols-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.flex{display:flex;align-items:center;gap:10px}
.flex-col{display:flex;flex-direction:column;gap:14px}
.between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px;overflow-x:auto}
.tabs button{padding:11px 16px;font-weight:600;font-size:13.5px;color:var(--muted);border-bottom:2px solid transparent;transition:.13s;white-space:nowrap}
.tabs button:hover{color:var(--ink)}
.tabs button.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:700}
.mini-bars{display:flex;align-items:flex-end;gap:8px;height:130px;padding-top:10px}
.mini-bars .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.mini-bars .bar>i{width:100%;max-width:38px;border-radius:8px 8px 3px 3px;background:linear-gradient(180deg,var(--brand),#1AB38C);transition:.4s;min-height:4px}
.mini-bars .bar.alt>i{background:linear-gradient(180deg,var(--accent),#FF9579)}
.mini-bars .bar small{font-size:11px;color:var(--muted);font-weight:600}

/* login */
.login{position:fixed;inset:0;z-index:300;display:grid;place-items:center;padding:20px;background:radial-gradient(120% 120% at 0% 0%,#0F2E29,#0B5746 60%,#12876C)}
.login-card{background:var(--surface);border-radius:24px;box-shadow:var(--shadow-lg);width:100%;max-width:400px;padding:36px 32px;text-align:center;animation:mp .4s ease}
.login-card .mark{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,var(--brand),#1AB38C);display:grid;place-items:center;margin:0 auto 18px;box-shadow:0 8px 22px rgba(18,135,108,.4)}
.login-card .mark svg{width:34px;height:34px}
.login-card h2{font-size:24px;font-weight:800;margin-bottom:4px}
.login-card p{color:var(--muted);margin-bottom:24px;font-size:13.5px}
.login-card .field{text-align:left}

.hide{display:none!important}

/* responsive */
@media(max-width:1080px){.cols-2{grid-template-columns:1fr}.cols-3{grid-template-columns:1fr 1fr}}
@media(max-width:860px){
  .sidebar{transform:translateX(-100%);box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:none}
  .main{margin-left:0}
  .hamb{display:grid}
  .content{padding:18px 16px 80px}
  .topbar{padding:10px 16px}
  .cols-3{grid-template-columns:1fr}
  .frow,.frow-3{grid-template-columns:1fr}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49}
}
@media(min-width:861px){.scrim{display:none}}
</style>
</head>

<div class="toasts" id="toasts"></div>
<div id="modalRoot"></div>

<script>

function pseudoQR(seed,size){
 size=size||21;let h=0;for(let i=0;i<seed.length;i++)h=(h*131+seed.charCodeAt(i))>>>0;
 const cell=4;const rnd=()=>{h=(h*1103515245+12345)>>>0;return (h>>>16)/65536;};
 let rects='';
 for(let y=0;y<size;y++)for(let x=0;x<size;x++){
   const finder=(x<7&&y<7)||(x>=size-7&&y<7)||(x<7&&y>=size-7);
   let on=finder?((x===0||x===6||y===0||y===6||(x>=2&&x<=4&&y>=2&&y<=4))||(x>=size-7&&(x===size-7||x===size-1))||(y>=size-7&&(y===size-7||y===size-1))):rnd()>0.5;
   if(finder){const inFinderBorder=(x%7===0||x%7===6||y%7===0||y%7===6);const inFinderDot=((x%7>=2&&x%7<=4)&&(y%7>=2&&y%7<=4));on=inFinderBorder||inFinderDot;}
   if(on)rects+=`<rect x="${x*cell}" y="${y*cell}" width="${cell}" height="${cell}"/>`;
 }
 return `<svg viewBox="0 0 ${size*cell} ${size*cell}" width="100" height="100" style="background:#fff" shape-rendering="crispEdges"><g fill="#0F2E29">${rects}</g></svg>`;
}

function formaOf(id){return (db.formasPag||[]).find(f=>f.id===id);}
function contaOf(id){return (db.contas||[]).find(c=>c.id===id);}
function taxaParcela(fp,n){n=n||1;if(!fp)return 0;if(fp.taxasParcelas&&fp.taxasParcelas[n-1]!=null)return fp.taxasParcelas[n-1];const base=fp.taxa||0;if(n<=1)return base;return +(base+(n-1)*(fp.taxaIncremento!=null?fp.taxaIncremento:0.8)).toFixed(2);}
function formaPorNome(nome){if(!nome)return null;const f=(db.formasPag||[]).find(x=>x.nome===nome);if(f)return f;const n=nome.toLowerCase();if(n.includes('dinheiro'))return formaOf('fp_din');if(n.includes('débito')||n.includes('debito'))return formaOf('fp_debitostone');if(n.includes('crédito')||n.includes('credito')||n.includes('cartão')||n.includes('cartao'))return formaOf('fp_creditostone');if(n.includes('pix'))return formaOf('fp_pixc6');if(n.includes('cheque'))return formaOf('fp_cheque');return null;}
function migrarContas(){
 let mudou=false;
 if(!db.contas){db.contas=CONTAS_PADRAO.map(c=>({...c}));mudou=true;}
 if(!db.formasPag){db.formasPag=FORMAS_PADRAO.map(f=>({...f}));mudou=true;}
 (db.formasPag||[]).forEach(f=>{if(f.tipo==='credito'&&f.maxParcelas==null){f.maxParcelas=12;if(f.taxaIncremento==null)f.taxaIncremento=0.8;mudou=true;}});
 (db.financeiro||[]).forEach(f=>{
   if(f.contaId)return;
   const fp=formaOf(f.formaId)||formaPorNome(f.forma);
   if(fp){f.formaId=fp.id;f.contaId=fp.contaId;f.taxa=fp.taxa;f.liquido=f.tipo==='receita'?+(f.valor*(1-fp.taxa/100)).toFixed(2):f.valor;f.liberacao=fp.prazoDias&&f.data?fmtDate(new Date(parseISO(f.data).getTime()+fp.prazoDias*864e5)):f.data;}
   else{f.contaId='ct_c6';f.liquido=f.valor;}
   mudou=true;
 });
 if(mudou)save();
}

function badgeFor(id){
 if(id==='agenda'){const n=db.agendamentos.filter(a=>a.data===todayISO()&&['agendado','confirmado','atendimento'].includes(a.status)).length;return n||'';}
 if(id==='internacao')return db.internacoes.filter(i=>i.status==='internado').length||'';
 if(id==='estoque'){const n=db.produtos.filter(p=>p.tipo==='produto'&&p.estoque<=p.min).length;return n||'';}
 if(id==='vacinas'){const n=vacinasPendentes().length;return n||'';}
 if(id==='estetica'){const n=db.agendamentos.filter(a=>a.data===todayISO()&&['banho','tosa'].includes(a.tipo)&&a.etapa!=='entregue'&&a.status!=='cancelado').length;return n||'';}
 if(id==='orcamentos'){const n=(db.orcamentos||[]).filter(o=>o.status==='aberto').length;return n||'';}
 if(id==='mensagens'){const n=mensagensDoDia().length;return n||'';}
 if(id==='retencao'){try{const n=db.clientes.filter(c=>{const m=metricasCliente(c);return m.recencia!==null&&m.recencia>60;}).length;return n||'';}catch(e){return '';}}
 return '';
}
function vacinasPendentes(){
 const out=[];const hoje=todayISO();
 allPets().forEach(({pet,cliente})=>pet.vacinas.forEach(v=>{if(v.proxima&&diasEntre(hoje,v.proxima)<=15)out.push({pet,cliente,vac:v,dias:diasEntre(hoje,v.proxima)});}));
 return out.sort((a,b)=>a.dias-b.dias);
}

 db.vendas.filter(v=>v.data===iso&&v.status==='pago').forEach(v=>t+=v.total);
 db.agendamentos.filter(a=>a.data===iso&&a.status==='finalizado').forEach(a=>{const j=db.vendas.some(v=>v.data===iso);if(!j)t+=a.valor;});
 return t;
}

 save();closeModal();toast('Prescrição adicionada ✓');renderView();
}

function renderVacinas(){
 const hoje=todayISO();
 const todas=[];allPets().forEach(({pet,cliente})=>pet.vacinas.forEach(v=>{const d=v.proxima?diasEntre(hoje,v.proxima):null;todas.push({pet,cliente,vac:v,dias:d});}));

function renderPdvGrid(){

function addCarrinho(id){const p=prodOf(id);const ex=carrinho.find(i=>i.id===id);if(ex)ex.qtd++;else carrinho.push({id,nome:p.nome,unit:p.preco,qtd:1,tipo:p.tipo});renderCarrinho();}
function mudaQtd(id,d){const it=carrinho.find(i=>i.id===id);it.qtd+=d;if(it.qtd<=0)carrinho=carrinho.filter(i=>i.id!==id);renderCarrinho();}
function renderCarrinho(){

 box.innerHTML=`${carrinho.length?`<div class="flex-col" style="gap:8px;margin:8px 0 4px;max-height:300px;overflow-y:auto">${carrinho.map(i=>`
     <div class="flex" style="gap:10px;padding:8px;background:var(--surface-2);border-radius:10px">

       <div class="flex" style="gap:4px"><button class="btn btn-icon btn-ghost btn-sm" style="width:28px;height:28px" onclick="mudaQtd('${i.id}',-1)">−</button><b style="width:22px;text-align:center">${i.qtd}</b><button class="btn btn-icon btn-ghost btn-sm" style="width:28px;height:28px" onclick="mudaQtd('${i.id}',1)">+</button></div>

     <div class="between" style="margin-bottom:14px"><b style="font-size:16px">Total</b><b style="font-size:22px;font-family:'Plus Jakarta Sans';color:var(--brand)">${BRL(total)}</b></div>
     <button class="btn btn-accent" style="width:100%" onclick="abrirPagamento()">${ic('money',16)} Finalizar venda</button>`
   :emptyState('cart','Comanda vazia','Toque nos produtos para adicionar.')}`;

let pgSub=0;
function abrirPagamento(){
 if(!carrinho.length)return;
 pgSub=carrinho.reduce((s,i)=>s+i.unit*i.qtd,0);
 const body=`<div id="pgResumo" style="text-align:center;padding:6px 0 14px"></div>
   <div class="field"><label>Desconto ${ic('shield',12)} <span class="t-sub">(autorizado pelo gerente)</span></label>
     <div class="flex" style="gap:8px"><input class="inp" id="pgDesc" value="0" style="flex:1" oninput="pgRecalc()">
       <select class="sel" id="pgDescTipo" style="width:80px" onchange="pgRecalc()"><option value="rs">R$</option><option value="pct">%</option></select>
       <select class="sel" id="pgAutoriz" style="flex:1"><option value="">Quem autorizou…</option>${db.profissionais.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('')}</select></div></div>
   <div class="field"><label>Forma de recebimento</label><div class="chiprow" id="pgFormas" style="margin:0">${(db.formasPag||[]).filter(f=>f.ativo!==false).map((f,i)=>`<button class="chip${i===0?' active':''}" data-f="${f.id}" onclick="pgSetForma('${f.id}')">${ic(TIPO_FORMA[f.tipo]?TIPO_FORMA[f.tipo].ic:'money',13)} ${f.nome}</button>`).join('')}</div></div>
   <div class="field" id="pgParcWrap" style="display:none"><label>Parcelas</label><select class="sel" id="pgParcelas" onchange="pgRecalc()"></select></div>
   <div class="field" id="pgRecebWrap"><label>Valor recebido</label><input class="inp" id="pgRecebido" value="${pgSub.toFixed(2).replace('.',',')}" oninput="pgRecalc()"><div id="pgTrocoBox" class="t-sub" style="text-align:right;margin-top:4px"></div></div>`;
 openModal({title:'Pagamento',body,foot:`<button class="btn btn-ghost" onclick="closeModal()">Voltar</button><button class="btn btn-primary" onclick="finalizarVenda()">${ic('check',15)} Confirmar recebimento</button>`});
 pgSetForma((db.formasPag.filter(f=>f.ativo!==false)[0]||{}).id);
}
function pgSetForma(id){$$('#pgFormas .chip').forEach(c=>c.classList.toggle('active',c.dataset.f===id));pgRecalc(true);}
function pgCalcAtual(){
 const fp=formaOf(($('#pgFormas .chip.active')||{}).dataset?.f)||db.formasPag[0];
 const descTipo=$('#pgDescTipo')?$('#pgDescTipo').value:'rs';
 let desc=parseFloat(($('#pgDesc')?$('#pgDesc').value:'0').replace(',','.'))||0;
 let descValor=descTipo==='pct'?pgSub*desc/100:desc;descValor=Math.max(0,Math.min(descValor,pgSub));
 const total=+(pgSub-descValor).toFixed(2);
 let n=1;if(fp.tipo==='credito'){n=parseInt($('#pgParcelas')&&$('#pgParcelas').value)||1;}
 const taxa=taxaParcela(fp,n);const liquido=+(total*(1-taxa/100)).toFixed(2);
 return {fp,descValor,total,n,taxa,liquido};
}
function pgRecalc(rebuild){
 if(!$('#pgResumo'))return;
 const c=pgCalcAtual();const fp=c.fp;
 if(fp.tipo==='credito'){$('#pgParcWrap').style.display='';if(rebuild){const max=fp.maxParcelas||12;$('#pgParcelas').innerHTML=Array.from({length:max},(_,i)=>i+1).map(k=>`<option value="${k}">${k}x — taxa ${taxaParcela(fp,k)}%</option>`).join('');}}
 else{$('#pgParcWrap').style.display='none';}
 const isDin=fp.tipo==='dinheiro';$('#pgRecebWrap').style.display=isDin?'':'none';
 if(isDin){const r=parseFloat(($('#pgRecebido').value||'0').replace(/[^\d,.-]/g,'').replace(',','.'))||0;const tr=r-c.total;$('#pgTrocoBox').innerHTML=tr>0?`Troco: <b style="color:var(--ink)">${BRL(tr)}</b>`:'';}
 const parcLine=c.n>1?`<div class="t-sub" style="margin-top:4px">${c.n}× de <b>${BRL(c.total/c.n)}</b> · 1ª libera em ${ddmm(fmtDate(new Date(Date.now()+(fp.prazoDias||0)*864e5)))}</div>`:'';
 const taxaLine=c.taxa?`<div class="t-sub" style="margin-top:4px">Taxa ${c.taxa}% · líquido <b style="color:var(--ok)">${BRL(c.liquido)}</b> em ${contaOf(fp.contaId)?contaOf(fp.contaId).nome:''}</div>`:`<div class="t-sub" style="margin-top:4px">Cai em ${contaOf(fp.contaId)?contaOf(fp.contaId).nome:''}</div>`;
 $('#pgResumo').innerHTML=`<div class="t-sub">Total a receber</div><div style="font-family:'Plus Jakarta Sans';font-size:32px;font-weight:800;color:var(--brand)">${BRL(c.total)}</div>${c.descValor>0?`<div class="t-sub" style="color:var(--accent-600)">desconto de ${BRL(c.descValor)} aplicado</div>`:''}${taxaLine}${parcLine}`;
}
function finalizarVenda(){
 const c=pgCalcAtual();const fp=c.fp,n=c.n,total=c.total;
 if(total<=0){toast('Total inválido','err');return;}
 const autorizadoPor=$('#pgAutoriz')?$('#pgAutoriz').value:'';
 if(c.descValor>0&&!autorizadoPor){toast('Informe quem autorizou o desconto','err');return;}
 const vend=$('#pdvVend').value;const cliNome=pdvCliente?cli(pdvCliente).nome:'Consumidor';
 const venda={id:novoId('vd'),data:todayISO(),clienteId:pdvCliente||null,profId:vend,itens:carrinho.map(i=>({nome:i.nome,qtd:i.qtd,unit:i.unit})),subtotal:pgSub,desconto:c.descValor,autorizadoPor,parcelas:n,pagamentos:[{forma:fp.nome,formaId:fp.id,valor:total,parcelas:n,taxa:c.taxa}],total,status:'pago'};
 db.vendas.push(venda);
 carrinho.forEach(i=>{const p=prodOf(i.id);if(p&&p.tipo==='produto'&&p.estoque!=null)p.estoque=Math.max(0,p.estoque-i.qtd);});
 // gera 1 recebível por parcela, com taxa/líquido e data de liberação
 const vC=Math.round(total*100),lC=Math.round(c.liquido*100),bV=Math.floor(vC/n),bL=Math.floor(lC/n);
 const novasFin=[];
 for(let k=1;k<=n;k++){
   const vk=(k===n?vC-bV*(n-1):bV)/100, lk=(k===n?lC-bL*(n-1):bL)/100;
   const lib=fp.prazoDias?fmtDate(new Date(Date.now()+fp.prazoDias*k*864e5)):todayISO();
   const reg={id:novoId('f'),tipo:'receita',desc:'Venda — '+cliNome+(n>1?` (parcela ${k}/${n})`:''),cat:'Vendas',valor:vk,venc:lib,pago:true,forma:fp.nome,formaId:fp.id,contaId:fp.contaId,taxa:c.taxa,liquido:lk,liberacao:lib,parcela:n>1?`${k}/${n}`:'',data:todayISO()};
   db.financeiro.push(reg);novasFin.push(reg);
 }
 let movCaixa=false;
 if(fp.tipo==='dinheiro'&&db.caixa&&db.caixa.aberto){const now=new Date();db.caixa.movimentos.push({h:String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'),tipo:'entrada',desc:'Venda #'+venda.id,valor:total,forma:fp.nome,formaId:fp.id});movCaixa=true;}
 save();persistirVenda(venda);persistirFinanceiroLista(novasFin);if(movCaixa)persistirCaixa();
 closeModal();toast('Venda finalizada · '+BRL(total)+(n>1?` em ${n}×`:'')+(c.taxa?' (líq. '+BRL(c.liquido)+')':'')+' ✓');carrinho=[];pdvCliente='';pdvBusca='';renderNav();renderPDV();
}

 const body=`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Data</th><th>Cliente</th><th>Itens</th><th>Pgto</th><th class="num">Total</th></tr></thead><tbody>

     ${comVal.map(p=>{const d=diasEntre(hoje,p.validade);return `<tr><td class="t-main">${p.nome}</td><td>${ddmmyy(p.validade)}</td><td class="num">${p.estoque} ${p.unidade}</td><td>${d<0?'<span class="badge2" style="background:var(--danger-soft);color:var(--danger)">Vencido</span>':d<=30?`<span class="badge2" style="background:var(--gold-soft);color:var(--gold)">vence em ${d}d</span>`:'<span class="badge2" style="background:var(--ok-soft);color:var(--ok)">ok</span>'}</td></tr>`;}).join('')}
   </tbody></table></div></div>`;
 } else {
   // Curva ABC por valor de venda (estoque*preço como proxy de relevância)
   const rank=produtos.map(p=>({p,val:p.preco*p.estoque})).sort((a,b)=>b.val-a.val);
   const tot=rank.reduce((s,x)=>s+x.val,0)||1;let acc=0;
   const rows=rank.map(x=>{acc+=x.val;const pctAcc=acc/tot*100;const classe=pctAcc<=80?'A':pctAcc<=95?'B':'C';return{...x,pctAcc,classe};});
   const cor={A:'var(--ok)',B:'var(--gold)',C:'var(--muted)'};
   box.innerHTML=`<div class="card"><div class="card-head"><h3>Curva ABC</h3><div class="sp"></div><span class="t-sub">Classe A = ~80% do valor · B = 80–95% · C = restante</span></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Produto</th><th>Classe</th><th class="num">Valor em estoque</th><th class="num">% acumulado</th></tr></thead><tbody>
     ${rows.map(r=>`<tr><td class="t-main">${r.p.nome}</td><td><span class="badge2" style="background:var(--surface-2);color:${cor[r.classe]}"><span class="d" style="background:${cor[r.classe]}"></span>Classe ${r.classe}</span></td><td class="num">${BRL(r.val)}</td><td class="num t-sub">${r.pctAcc.toFixed(1)}%</td></tr>`).join('')}
   </tbody></table></div></div>`;
 }
}

let relPeriodo='mes';
function renderRelatorios(){
 const t=new Date();const M=t.getMonth(),Y=t.getFullYear();
 const inPeriodo=iso=>{const d=parseISO(iso);if(relPeriodo==='mes')return d.getMonth()===M&&d.getFullYear()===Y;if(relPeriodo==='30')return diasEntre(iso,todayISO())<=30&&diasEntre(iso,todayISO())>=0;return d.getFullYear()===Y;};
 const vendas=db.vendas.filter(v=>inPeriodo(v.data));
 const agsFin=db.agendamentos.filter(a=>a.status==='finalizado'&&inPeriodo(a.data));
 const receita=vendas.reduce((s,v)=>s+v.total,0)+agsFin.reduce((s,a)=>s+a.valor,0);
 const despesas=db.financeiro.filter(f=>f.tipo==='despesa'&&f.pago&&inPeriodo(f.venc)).reduce((s,f)=>s+f.valor,0);
 // por profissional
 const porProf=db.profissionais.map(p=>{const v=agsFin.filter(a=>a.profId===p.id).length;const fat=agsFin.filter(a=>a.profId===p.id).reduce((s,a)=>s+a.valor,0)+vendas.filter(x=>x.profId===p.id).reduce((s,x)=>s+x.total,0);return{p,v,fat};}).sort((a,b)=>b.fat-a.fat);
 const maxProf=Math.max(...porProf.map(x=>x.fat),1);
 // formas pgto
 const formas={};vendas.forEach(v=>{const f=v.pagamentos[0].forma;formas[f]=(formas[f]||0)+v.total;});
 const totForma=Object.values(formas).reduce((a,b)=>a+b,0)||1;
 // serviços
 const serv={};agsFin.forEach(a=>{serv[a.servicoNome]=(serv[a.servicoNome]||0)+1;});
 const topServ=Object.entries(serv).sort((a,b)=>b[1]-a[1]).slice(0,6);const maxServ=Math.max(...topServ.map(s=>s[1]),1);
 $('#content').innerHTML=`
 ${phead('Relatórios','Desempenho de faturamento, equipe e serviços.',
   `<div class="seg"><button class="${relPeriodo==='mes'?'active':''}" onclick="relPeriodo='mes';renderRelatorios()">Mês</button><button class="${relPeriodo==='30'?'active':''}" onclick="relPeriodo='30';renderRelatorios()">30 dias</button><button class="${relPeriodo==='ano'?'active':''}" onclick="relPeriodo='ano';renderRelatorios()">Ano</button></div>`)}
 <div class="kpis">
   ${kpi('money','ok','Faturamento',BRL(receita))}
   ${kpi('financeiro','danger','Despesas',BRL(despesas))}
   ${kpi('relatorio','teal','Resultado',BRL(receita-despesas))}
   ${kpi('agenda','info','Atendimentos',agsFin.length)}
 </div>
 <div class="cols-2">
   <div class="card"><div class="card-head"><h3>Faturamento por profissional</h3></div><div class="card-pad flex-col" style="gap:14px">
     ${porProf.map(x=>`<div><div class="between" style="margin-bottom:5px"><span>${profPill(x.p.id)} <span class="t-sub">· ${x.v} atend.</span></span><b>${BRL(x.fat)}</b></div><div class="prog"><i style="width:${x.fat/maxProf*100}%;background:${x.p.cor}"></i></div></div>`).join('')}
   </div></div>
   <div class="card"><div class="card-head"><h3>Recebimentos por forma</h3></div><div class="card-pad flex-col" style="gap:12px">
     ${Object.keys(formas).length?Object.entries(formas).sort((a,b)=>b[1]-a[1]).map(([f,v])=>`<div><div class="between" style="margin-bottom:5px"><span style="font-weight:600;font-size:13px">${f}</span><span>${BRL(v)} <span class="t-sub">(${(v/totForma*100).toFixed(0)}%)</span></span></div><div class="prog"><i style="width:${v/totForma*100}%"></i></div></div>`).join(''):'<div class="t-sub">Sem vendas no período.</div>'}
   </div></div>
 </div>
 <div class="card" style="margin-top:18px"><div class="card-head"><h3>Serviços mais realizados</h3></div><div class="card-pad" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
   ${topServ.length?topServ.map(([nm,n])=>`<div><div class="between" style="margin-bottom:5px"><span style="font-weight:600;font-size:13px">${nm}</span><span class="t-sub">${n}x</span></div><div class="prog"><i style="width:${n/maxServ*100}%;background:linear-gradient(90deg,var(--accent),#FF9579)"></i></div></div>`).join(''):'<div class="t-sub">Sem dados.</div>'}
 </div></div>`;
}

function novoId(p){ try{ if(supaOn()&&typeof crypto!=='undefined'&&crypto.randomUUID) return crypto.randomUUID(); }catch(e){} return uid(p); }
function ehUuid(s){ return typeof s==='string' && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(s); }

// ---- mapeamento app <-> banco (objeto completo em extra; colunas espelhadas p/ busca) ----
function unmapCliente(c){ const {pets, ...rest}=c; return {
  id:c.id, clinica_id:clinicaAtual, legacy_id: ehUuid(c.id)?null:c.id,
  nome:c.nome||'', telefone:c.tel||'', email:c.email||'', cpf:c.cpf||'',
  endereco:{texto:c.end||''}, hist_import:c.histImport||{}, origem:c.origem||'manual', extra:rest }; }
function mapCliente(row){ const b=(row.extra&&typeof row.extra==='object')?{...row.extra}:{}; b.id=row.id;
  b.nome=row.nome??b.nome; b.tel=b.tel??row.telefone??''; b.email=b.email??row.email??''; b.cpf=b.cpf??row.cpf??'';
  if(row.endereco&&row.endereco.texto&&!b.end)b.end=row.endereco.texto;
  if(row.hist_import&&!b.histImport)b.histImport=row.hist_import; b.pets=[]; if(!b.criado)b.criado=todayISO(); return b; }
function unmapPet(p,cliId){ return {
  id:p.id, clinica_id:clinicaAtual, cliente_id:cliId, legacy_id: ehUuid(p.id)?null:p.id,
  nome:p.nome||'', especie:p.especie||'', raca:p.raca||'', sexo:p.sexo||'', peso:parseFloat(p.peso)||null, extra:p }; }
function mapPet(row){ const p=(row.extra&&typeof row.extra==='object')?{...row.extra}:{}; p.id=row.id; p.nome=p.nome??row.nome;
  if(!p.vacinas)p.vacinas=[]; if(!p.prontuario)p.prontuario=[]; return p; }

async function carregarClinica(){
  try{
    const { data:{ user } } = await sb.auth.getUser();
    if(!user) return false;
    const { data:membros, error:e1 } = await sb.from('membros').select('*').eq('user_id',user.id).limit(1);
    if(e1) throw e1;
    if(!membros||!membros.length) return false;
    membroAtual=membros[0]; clinicaAtual=membroAtual.clinica_id;
    db.usuarios=[{ id:user.id, nome:membroAtual.nome||user.email, perfil:membroAtual.papel||'dono', email:user.email }];
    const { data:cls, error:e2 } = await sb.from('clientes').select('*').eq('clinica_id',clinicaAtual);
    if(e2) throw e2;
    const { data:pts, error:e3 } = await sb.from('pets').select('*').eq('clinica_id',clinicaAtual);
    if(e3) throw e3;
    const clientes=(cls||[]).map(mapCliente), byId={}; clientes.forEach(c=>byId[c.id]=c);
    (pts||[]).forEach(row=>{ const c=byId[row.cliente_id]; if(c) c.pets.push(mapPet(row)); });
    db.clientes=clientes;
    // ---- financeiro: contas, formas, vendas, lançamentos, caixa ----
    const { data:contasRows } = await sb.from('contas').select('*').eq('clinica_id',clinicaAtual);
    if(!contasRows||!contasRows.length){
      // primeira vez: semeia contas e formas padrão nesta clínica
      try{ await sb.from('contas').upsert(CONTAS_PADRAO.map(c=>unmapConta(c))); await sb.from('formas_pag').upsert(FORMAS_PADRAO.map(f=>unmapForma(f))); }catch(e){ console.error('seed contas/formas',e); }
      db.contas=CONTAS_PADRAO.map(c=>({...c})); db.formasPag=FORMAS_PADRAO.map(f=>({...f}));
    } else {
      db.contas=contasRows.map(mapConta);
      const { data:formasRows } = await sb.from('formas_pag').select('*').eq('clinica_id',clinicaAtual);
      db.formasPag=(formasRows&&formasRows.length)?formasRows.map(mapForma):FORMAS_PADRAO.map(f=>({...f}));
    }
    const { data:vd } = await sb.from('vendas').select('*').eq('clinica_id',clinicaAtual);
    db.vendas=(vd||[]).map(mapVenda);
    const { data:fn } = await sb.from('financeiro').select('*').eq('clinica_id',clinicaAtual);
    db.financeiro=(fn||[]).map(mapFinanceiro);
    const { data:cx } = await sb.from('caixa').select('*').eq('clinica_id',clinicaAtual).limit(1);
    if(cx&&cx[0]&&cx[0].dados&&Object.keys(cx[0].dados).length) db.caixa=cx[0].dados;
    return true;
  }catch(err){ console.error('carregarClinica:',err); toast('Erro ao carregar dados da clínica','err'); return true; }
}

function dnull(d){ return (d&&d!=='')?d:null; }
function mapVenda(row){ const v=(row.extra&&typeof row.extra==='object')?{...row.extra}:{}; v.id=row.id; if(!v.data)v.data=row.data; if(v.total==null)v.total=row.total; return v; }
function unmapVenda(v){ return { id:v.id, clinica_id:clinicaAtual, data:dnull(v.data), cliente_id:ehUuid(v.clienteId)?v.clienteId:null, prof_id:v.profId||null, total:v.total, extra:v }; }
function mapFinanceiro(row){ const f=(row.extra&&typeof row.extra==='object')?{...row.extra}:{}; f.id=row.id; return f; }
function unmapFinanceiro(f){ return { id:f.id, clinica_id:clinicaAtual, tipo:f.tipo, descricao:f.desc||'', categoria:f.cat||'', valor:f.valor, vencimento:dnull(f.venc), pago:!!f.pago, forma:f.forma||'', forma_id:f.formaId||null, conta_id:f.contaId||null, liquido:f.liquido, liberacao:dnull(f.liberacao), data:dnull(f.data), parcela:f.parcela||'', extra:f }; }
function mapConta(row){ const c=(row.extra&&typeof row.extra==='object')?{...row.extra}:{}; c.id=row.id; c.nome=c.nome??row.nome; if(c.saldoInicial==null)c.saldoInicial=row.saldo_inicial; return c; }
function unmapConta(c){ return { id:c.id, clinica_id:clinicaAtual, nome:c.nome, tipo:c.tipo, saldo_inicial:c.saldoInicial||0, extra:c }; }
function mapForma(row){ const f=(row.extra&&typeof row.extra==='object')?{...row.extra}:{}; f.id=row.id; f.nome=f.nome??row.nome; return f; }
function unmapForma(f){ return { id:f.id, clinica_id:clinicaAtual, nome:f.nome, tipo:f.tipo, conta_id:f.contaId||null, taxa:f.taxa||0, prazo_dias:f.prazoDias||0, max_parcelas:f.maxParcelas||null, extra:f }; }

// ---- migração: enviar os dados locais (ex: 690 clientes importados) p/ a nuvem ----
async function migrarLocalParaNuvem(){
  if(!supaOn()){ toast('Disponível só no modo nuvem','err'); return; }
  const local=load(); if(!local||!local.clientes||!local.clientes.length){ toast('Nada local para enviar'); return; }
  if(!confirm('Enviar '+local.clientes.length+' clientes (e seus pets) para a nuvem desta clínica?')) return;
  toast('Enviando… isso pode levar alguns segundos');
  try{
    const cls=[], pts=[];
    local.clientes.forEach(c0=>{
      const c={...c0}; const old=c.id; if(!ehUuid(c.id)) c.id=novoId('c'); c.legacyOld=old;
      const pets=(c.pets||[]); cls.push(unmapCliente(c));
      pets.forEach(p0=>{ const p={...p0}; if(!ehUuid(p.id)) p.id=novoId('p'); pts.push(unmapPet(p,c.id)); });
    });
    for(let i=0;i<cls.length;i+=200){ const {error}=await sb.from('clientes').upsert(cls.slice(i,i+200)); if(error)throw error; }
    for(let i=0;i<pts.length;i+=200){ const {error}=await sb.from('pets').upsert(pts.slice(i,i+200)); if(error)throw error; }
    toast('Enviados '+cls.length+' clientes e '+pts.length+' pets ✓');
    await carregarClinica(); renderView();
  }catch(err){ console.error(err); toast('Falha na migração: '+(err.message||''),'err'); }
}

let orcItens=[],orcFiltro='todos';
const ST_ORC={aberto:{lbl:'Aberto',cor:'var(--gold)',bg:'var(--gold-soft)'},aprovado:{lbl:'Aprovado',cor:'var(--info)',bg:'var(--info-soft)'},recusado:{lbl:'Recusado',cor:'var(--danger)',bg:'var(--danger-soft)'},faturado:{lbl:'Faturado',cor:'var(--ok)',bg:'var(--ok-soft)'}};
function renderOrcamentos(){
 const orcs=(db.orcamentos||[]).slice().sort((a,b)=>b.data.localeCompare(a.data));
 let list=orcFiltro==='todos'?orcs:orcs.filter(o=>o.status===orcFiltro);
 const abertos=orcs.filter(o=>o.status==='aberto');

 $('#content').innerHTML=`
 ${phead('Orçamentos','Monte propostas, acompanhe aprovações e fature em um clique.','<button class="btn btn-primary" onclick="novoOrcamento()">'+ic('plus',15)+' Novo orçamento</button>')}
 <div class="kpis">
   ${kpi('orcamento','gold','Em aberto',abertos.length+' · '+BRL(abertos.reduce((s,o)=>s+o.total,0)))}
   ${kpi('check','ok','Taxa de aprovação',taxa+'%')}
   ${kpi('money','teal','Faturados (total)',BRL(orcs.filter(o=>o.status==='faturado').reduce((s,o)=>s+o.total,0)))}
 </div>
 <div class="chiprow">
   <button class="chip${orcFiltro==='todos'?' active':''}" onclick="orcFiltro='todos';renderOrcamentos()">Todos<span class="ct">${orcs.length}</span></button>
   ${Object.entries(ST_ORC).map(([k,v])=>`<button class="chip${orcFiltro===k?' active':''}" onclick="orcFiltro='${k}';renderOrcamentos()"><span class="d" style="width:8px;height:8px;border-radius:50%;background:${v.cor}"></span>${v.lbl}<span class="ct">${orcs.filter(o=>o.status===k).length}</span></button>`).join('')}
 </div>
 <div class="card"><div class="tbl-wrap"><table class="tbl">
   <thead><tr><th>Data</th><th>Cliente / Pet</th><th>Itens</th><th>Validade</th><th>Status</th><th class="num">Total</th><th></th></tr></thead>
   <tbody>${list.length?list.map(o=>{const c=cli(o.clienteId);const r=petOf(o.petId);const venc=o.validade&&diasEntre(todayISO(),o.validade)<0&&o.status==='aberto';return `<tr style="cursor:pointer" onclick="abrirOrcamento('${o.id}')">
     <td>${ddmmyy(o.data)}</td>

     <td><span class="badge2" style="background:${ST_ORC[o.status].bg};color:${ST_ORC[o.status].cor}">${ST_ORC[o.status].lbl}</span></td>
     <td class="num">${BRL(o.total)}</td>
     <td style="text-align:right">${ic('chevron',16)}</td>
   </tr>`;}).join(''):`<tr><td colspan="7">${emptyState('orcamento','Nenhum orçamento','Crie a primeira proposta para um cliente.')}</td></tr>`}</tbody>
 </table></div></div>`;

function novoOrcamento(presetCli){

 const body=`

   <div class="field"><label>Adicionar item</label>
     <div class="flex" style="gap:8px"><select class="sel" id="ocProd" style="flex:1">${db.produtos.map(p=>`<option value="${p.id}" data-preco="${p.preco}">${p.nome} — ${BRL(p.preco)}</option>`).join('')}</select><button class="btn btn-soft" onclick="addOrcItem()">${ic('plus',15)}</button></div></div>

}
function addOrcItem(){const sel=$('#ocProd');const p=prodOf(sel.value);const ex=orcItens.find(i=>i.id===p.id);if(ex)ex.qtd++;else orcItens.push({id:p.id,nome:p.nome,unit:p.preco,qtd:1});renderOrcLista();}
function rmOrcItem(id){orcItens=orcItens.filter(i=>i.id!==id);renderOrcLista();}
function renderOrcLista(){
 const box=$('#ocLista');if(!box)return;const total=orcItens.reduce((s,i)=>s+i.unit*i.qtd,0);
 box.innerHTML=orcItens.length?`<div class="flex-col" style="gap:6px">${orcItens.map(i=>`<div class="flex" style="gap:10px;padding:8px 10px;background:var(--surface-2);border-radius:9px"><span style="flex:1;font-size:13px;font-weight:600">${i.nome}</span><div class="flex" style="gap:4px"><button class="btn btn-icon btn-ghost btn-sm" style="width:26px;height:26px" onclick="orcQtd('${i.id}',-1)">−</button><b style="width:20px;text-align:center">${i.qtd}</b><button class="btn btn-icon btn-ghost btn-sm" style="width:26px;height:26px" onclick="orcQtd('${i.id}',1)">+</button></div><b style="width:80px;text-align:right">${BRL(i.unit*i.qtd)}</b><button class="btn btn-icon btn-ghost btn-sm" style="width:26px;height:26px;color:var(--danger)" onclick="rmOrcItem('${i.id}')">${ic('x',13)}</button></div>`).join('')}</div><div class="between" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--line)"><b>Total</b><b style="font-size:18px;color:var(--brand)">${BRL(total)}</b></div>`:'<div class="t-sub" style="text-align:center;padding:14px;background:var(--surface-2);border-radius:9px">Nenhum item adicionado</div>';
}
function orcQtd(id,d){const it=orcItens.find(i=>i.id===id);it.qtd+=d;if(it.qtd<=0)orcItens=orcItens.filter(i=>i.id!==id);renderOrcLista();}
function salvarOrcamento(){
 const petId=$('#ocPet').value;if(!petId){toast('Selecione o pet','err');return;}if(!orcItens.length){toast('Adicione ao menos um item','err');return;}

 db.orcamentos.push({id:uid('orc'),data:todayISO(),clienteId:cliente.id,petId,profId:usuarioAtual().profId||'f1',itens:orcItens.map(i=>({nome:i.nome,qtd:i.qtd,unit:i.unit})),total:orcItens.reduce((s,i)=>s+i.unit*i.qtd,0),validade:$('#ocValidade').value,status:'aberto',obs:$('#ocObs').value});
 save();closeModal();toast('Orçamento criado ✓');renderNav();renderOrcamentos();
}

 ${transportes.length?`<div class="card" style="margin-top:18px"><div class="card-head"><h3>${ic('truck',17)} Leva e traz</h3><div class="sp"></div><span class="t-sub">Motorista: ${profOf('f5')?.nome||''}</span></div><div class="tbl-wrap"><table class="tbl"><thead><tr><th>Pet</th><th>Endereço</th><th>Status</th><th></th></tr></thead><tbody>

const TIPO_MSG={
 confirmacao:{lbl:'Confirmar hoje',ic:'check',cor:'var(--info)'},

function primeiro(n){return (n||'').split(' ')[0];}
function mensagensDoDia(){
 const out=[];const hoje=todayISO();const amanha=fmtDate(new Date(Date.now()+864e5));const ontem=fmtDate(new Date(Date.now()-864e5));
 const emp=db.empresa.nome;
 // confirmar hoje
 db.agendamentos.filter(a=>a.data===hoje&&a.status==='agendado').forEach(a=>{const r=petOf(a.petId);if(!r)return;out.push({id:'m'+a.id+'c',tipo:'confirmacao',clienteId:r.cliente.id,tel:r.cliente.tel,nome:r.cliente.nome,pet:r.pet.nome,texto:`Oi ${primeiro(r.cliente.nome)}! Confirmando o atendimento do(a) ${r.pet.nome} hoje às ${a.hora} na ${emp}. Podemos confirmar? 🐾`});});
 // lembrete amanhã
 db.agendamentos.filter(a=>a.data===amanha&&['agendado','confirmado'].includes(a.status)).forEach(a=>{const r=petOf(a.petId);if(!r)return;out.push({id:'m'+a.id+'l',tipo:'lembrete',clienteId:r.cliente.id,tel:r.cliente.tel,nome:r.cliente.nome,pet:r.pet.nome,texto:`Olá ${primeiro(r.cliente.nome)}! Passando para lembrar do atendimento do(a) ${r.pet.nome} amanhã às ${a.hora} (${a.servicoNome}) na ${emp}. Até lá! 🐶`});});
 // vacina
 vacinasPendentes().slice(0,8).forEach(v=>{out.push({id:'m'+v.vac.id,tipo:'vacina',clienteId:v.cliente.id,tel:v.cliente.tel,nome:v.cliente.nome,pet:v.pet.nome,texto:`Oi ${primeiro(v.cliente.nome)}! A vacina ${v.vac.nome} do(a) ${v.pet.nome} ${v.dias<0?'está atrasada':'está prevista para '+ddmmyy(v.vac.proxima)}. Vamos agendar? 💉`});});
 // aniversário (tutor) hoje
 db.clientes.filter(c=>{if(!c.nasc)return false;const n=parseISO(c.nasc),t=new Date();return n.getDate()===t.getDate()&&n.getMonth()===t.getMonth();}).forEach(c=>out.push({id:'mb'+c.id,tipo:'aniversario',clienteId:c.id,tel:c.tel,nome:c.nome,pet:'',texto:`Feliz aniversário, ${primeiro(c.nome)}! 🎉 A equipe da ${emp} deseja um dia incrível para você e seu pet. Conte com a gente! 🐾`}));
 // pós-atendimento (ontem finalizado)
 db.agendamentos.filter(a=>a.data===ontem&&a.status==='finalizado').forEach(a=>{const r=petOf(a.petId);if(!r)return;out.push({id:'m'+a.id+'r',tipo:'retorno',clienteId:r.cliente.id,tel:r.cliente.tel,nome:r.cliente.nome,pet:r.pet.nome,texto:`Oi ${primeiro(r.cliente.nome)}! Como está o(a) ${r.pet.nome} depois do atendimento de ontem? Qualquer dúvida estamos à disposição. 💚`});});
 return out;
}

}

/* ============================================================
   RETENÇÃO / RFM (recuperação de inativos)
   ============================================================ */
let rfmDias=60;
function metricasCliente(c){
 const datas=new Set();let valor=0;
 db.vendas.filter(v=>v.clienteId===c.id).forEach(v=>{datas.add(v.data);valor+=v.total||0;});
 db.agendamentos.filter(a=>a.clienteId===c.id&&a.status==='finalizado').forEach(a=>{datas.add(a.data);valor+=a.valor||0;});
 c.pets.forEach(p=>(p.prontuario||[]).forEach(h=>{if(h.data)datas.add(h.data);}));
 (db.assinaturas||[]).filter(s=>s.clienteId===c.id).forEach(s=>(s.historico||[]).forEach(h=>{if(/Cobran/.test(h.txt)){const pl=(db.planos||[]).find(p=>p.id===s.planoId);if(pl)valor+=pl.preco;}}));
 const arr=[...datas].sort();let ultima=arr.length?arr[arr.length-1]:null;let freq=datas.size;
 if(c.histImport){freq+=c.histImport.freq||0;valor+=c.histImport.valor||0;if(c.histImport.ultima&&(!ultima||c.histImport.ultima>ultima))ultima=c.histImport.ultima;}
 const recencia=ultima?diasEntre(ultima,todayISO()):null;
 return {freq,valor,ultima,recencia};
}
function segmentoCliente(m){
 if(m.recencia===null)return {nome:'Sem histórico',cor:'var(--muted)'};
 const valioso=m.valor>=300;
 if(m.recencia<=30)return (m.freq>=4||m.valor>=600)?{nome:'Campeão',cor:'var(--brand)'}:(m.freq<=1?{nome:'Novo',cor:'var(--info)'}:{nome:'Ativo',cor:'var(--ok)'});
 if(m.recencia<=60)return {nome:'Atenção',cor:'var(--gold)'};
 if(m.recencia<=120)return {nome:valioso?'Em risco · valioso':'Em risco',cor:'var(--accent-600)'};
 return {nome:valioso?'Inativo · valioso':'Inativo',cor:'var(--danger)'};
}
function baseRFM(){return db.clientes.map(c=>{const m=metricasCliente(c);return {c,...m,seg:segmentoCliente(m)};});}
function renderRetencao(){
 const base=baseRFM();
 const ativos=base.filter(x=>x.recencia!==null&&x.recencia<=30).length;
 const inativos=base.filter(x=>x.recencia!==null&&x.recencia>rfmDias);
 const comHist=base.filter(x=>x.recencia!==null);
 const retorno=comHist.length?Math.round(base.filter(x=>x.freq>=2).length/comHist.length*100):0;
 const receitaRisco=base.filter(x=>x.recencia!==null&&x.recencia>60).reduce((s,x)=>s+x.valor,0);
 const totVisitas=base.reduce((s,x)=>s+x.freq,0);const totValor=base.reduce((s,x)=>s+x.valor,0);
 const ticket=totVisitas?totValor/totVisitas:0;
 // distribuição por segmento
 const segOrder=['Campeão','Ativo','Novo','Atenção','Em risco','Em risco · valioso','Inativo','Inativo · valioso','Sem histórico'];
 const dist={};base.forEach(x=>dist[x.seg.nome]=(dist[x.seg.nome]||0)+1);
 const listaInativos=inativos.slice().sort((a,b)=>b.valor-a.valor);
 const ranking=base.filter(x=>x.valor>0).sort((a,b)=>b.valor-a.valor).slice(0,8);
 $('#content').innerHTML=`
 ${phead('Retenção','Quem está voltando, quem sumiu e quanto dinheiro está na mesa.')}
 <div class="kpis">
   ${kpi('user','ok','Clientes ativos (30d)',ativos)}
   ${kpi('alert','coral','Inativos (+'+rfmDias+'d)',inativos.length)}
   ${kpi('repeat','teal','Taxa de retorno',retorno+'%')}
   ${kpi('money','gold','Receita em risco',BRL(receitaRisco))}
 </div>

let impRows=[],impHeaders=[],impMap={},impSV=null;
const normTxt=s=>String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
const IMP_ALVOS=[
 {k:'nome',lb:'Nome do cliente',req:true},

 {k:'email',lb:'E-mail'},
 {k:'cpf',lb:'CPF'},

function baixarModeloCSV(){
 const csv='Nome;Telefone;Email;CPF;Endereço;Pet;Total gasto;Visitas;Última visita\nMaria Silva;(79) 99999-0000;maria@email.com;000.000.000-00;Rua A, 100 — Aracaju/SE;Rex;1250,00;8;10/05/2026\nJoão Souza;(79) 98888-1111;joao@email.com;;Rua B, 200 — Aracaju/SE;Mel;430,50;3;22/02/2026\n';
 const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='modelo-clientes.csv';a.click();
}
function handleImportFile(input){
 const f=input.files[0];if(!f)return;const ext=f.name.split('.').pop().toLowerCase();
 if(ext==='csv'||ext==='txt'){const rd=new FileReader();rd.onload=e=>{const {headers,rows}=parseCSV(e.target.result);prepImport(headers,rows);};rd.readAsText(f,'utf-8');}
 else{ensureXLSX(()=>{const rd=new FileReader();rd.onload=e=>{try{const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const arr=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});const headers=(arr[0]||[]).map(h=>String(h).trim());const rows=arr.slice(1).map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]!=null?String(r[i]).trim():'');return o;});prepImport(headers,rows);}catch(err){toast('Erro ao ler o Excel. Tente salvar como CSV.','err');}};rd.readAsArrayBuffer(f);});}
}
function ensureXLSX(cb){if(window.XLSX)return cb();toast('Carregando leitor de Excel…');const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.onload=()=>cb();s.onerror=()=>toast('Não foi possível carregar o leitor de Excel. Salve a planilha como CSV e tente de novo.','err');document.head.appendChild(s);}
function parseCSV(text){
 text=text.replace(/^\ufeff/,'').replace(/\r\n/g,'\n').replace(/\r/g,'\n');
 const first=text.split('\n')[0]||'';const delim=(first.split(';').length>first.split(',').length)?';':',';
 const rows=[];let field='',row=[],inQ=false;
 for(let i=0;i<text.length;i++){const ch=text[i];
   if(inQ){if(ch==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=ch;}
   else{if(ch==='"')inQ=true;else if(ch===delim){row.push(field);field='';}else if(ch==='\n'){row.push(field);rows.push(row);row=[];field='';}else field+=ch;}
 }
 if(field.length||row.length){row.push(field);rows.push(row);}
 const headers=(rows.shift()||[]).map(h=>h.trim());
 const objs=rows.filter(r=>r.some(c=>c&&c.trim())).map(r=>{const o={};headers.forEach((h,i)=>o[h]=(r[i]||'').trim());return o;});
 return {headers,rows:objs};
}
function autoMap(headers){
 const find=(...keys)=>headers.find(h=>{const l=h.toLowerCase();return keys.some(k=>l.includes(k));})||'';
 return {nome:find('nome','cliente','tutor','propriet','respons'),tel:find('celular','whats','telefone','fone','contato'),email:find('email','e-mail'),cpf:find('cpf','documento'),end:find('endere','lograd','rua'),pet:find('pet','animal','paciente'),valor:find('valor','total','gasto','fatur','receita','365'),visitas:find('visita','atendiment','compra','frequ','qtd'),ultima:find('última','ultima','last','recente','venda','data')};
}
function prepImport(headers,rows){
 if(!headers.length||!rows.length){toast('Não encontrei dados na planilha','err');return;}
 impHeaders=headers;impRows=rows;impSV=null;
 if(detectarSimplesVet(headers)){impSV=prepararSimplesVet(headers,rows);renderConfirmSV();return;}
 impMap=autoMap(headers);renderMapeamento();
}
function detectarSimplesVet(headers){const n=headers.map(normTxt);return n.some(h=>h.includes('animal - nome'))&&n.some(h=>h.includes('cliente - nome'));}
function colIdx(headers,substr){const s=normTxt(substr);return headers.find(h=>normTxt(h).includes(s))||'';}
function prepararSimplesVet(headers,rows){
 const C=(...s)=>{for(const x of s){const h=colIdx(headers,x);if(h)return h;}return '';};
 const gi={aniNome:C('animal - nome'),aniEsp:C('animal - especie'),aniRaca:C('animal - raca'),aniSexo:C('animal - sexo'),aniNasc:C('animal - nascimento'),aniPel:C('animal - pelagem'),aniCast:C('animal - esteriliz'),
   cliCod:C('cliente - codigo'),cliNome:C('cliente - nome'),cliCpf:C('cliente - cpf'),cliEmail:C('cliente - email'),cliTel:C('cliente - telefone'),
   cliEnd:C('cliente - endereco'),cliBairro:C('cliente - bairro'),cliCidade:C('cliente - cidade'),cliUF:C('cliente - uf'),cliCep:C('cliente - cep'),cliNasc:C('cliente - data de nascimento'),
   val365:C('ultimos 365','365 dias'),ultVenda:C('cliente - ultima venda','ultima venda'),ticket:C('ticket medio'),abc:C('ranking abc')};
 const g=(row,h)=>h&&row[h]!=null?String(row[h]).trim():'';
 const map=new Map();
 rows.forEach(row=>{
   const nome=g(row,gi.cliNome);if(!nome)return;
   const key=g(row,gi.cliCod)||normTxt(nome);
   if(!map.has(key)){
     const endParts=[g(row,gi.cliEnd),g(row,gi.cliBairro),[g(row,gi.cliCidade),g(row,gi.cliUF)].filter(Boolean).join('/'),g(row,gi.cliCep)].filter(Boolean);
     map.set(key,{nome,cpf:g(row,gi.cliCpf),email:g(row,gi.cliEmail),tel:g(row,gi.cliTel),end:endParts.join(', '),nasc:parseData(g(row,gi.cliNasc))||'',
       val365:parseMoeda(g(row,gi.val365)),ticket:parseMoeda(g(row,gi.ticket)),ultima:parseData(g(row,gi.ultVenda)),abc:g(row,gi.abc),pets:[]});
   }
   const pn=g(row,gi.aniNome);
   if(pn){const e=normTxt(g(row,gi.aniEsp));const esp=e.includes('canin')?'cao':e.includes('felin')?'gato':e.includes('av')?'ave':e.includes('exot')?'exotico':e.includes('roedor')?'roedor':e.includes('reptil')?'reptil':'cao';
     map.get(key).pets.push({nome:pn,especie:esp,raca:g(row,gi.aniRaca)||'SRD',sexo:normTxt(g(row,gi.aniSexo)).startsWith('m')?'M':'F',porte:'medio',nasc:parseData(g(row,gi.aniNasc))||'',cor:g(row,gi.aniPel),cast:/castrad/i.test(g(row,gi.aniCast))});}
 });
 return [...map.values()];
}

 openModal({title:'Mapear colunas',body,size:'wide',foot:`<button class="btn btn-ghost" onclick="openImportarClientes()">${ic('chevron',14)} Trocar arquivo</button><button class="btn btn-primary" onclick="confirmarImport()">${ic('check',15)} Importar ${impRows.length} clientes</button>`});
}
function parseMoeda(v){if(v==null||v==='')return 0;let s=String(v).replace(/[R$\s]/gi,'');if(s.includes(',')){s=s.replace(/\./g,'').replace(',','.');}return parseFloat(s.replace(/[^0-9.\-]/g,''))||0;}
function parseData(v){if(!v)return null;v=String(v).trim();let m;
 if(m=v.match(/^(\d{4})-(\d{2})-(\d{2})/))return `${m[1]}-${m[2]}-${m[3]}`;
 if(m=v.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/)){let d=m[1],mo=m[2],y=m[3];if(y.length===2)y='20'+y;return `${y}-${mo.padStart(2,'0')}-${d.padStart(2,'0')}`;}
 const dt=new Date(v);return isNaN(dt)?null:fmtDate(dt);}
function confirmarImport(){
 const m=impMap;if(!m.nome){toast('Selecione a coluna do nome','err');return;}
 const usarHist=$('#impUsarHist')&&$('#impUsarHist').checked;let add=0;
 impRows.forEach(r=>{
   const nome=(r[m.nome]||'').trim();if(!nome)return;
   const c={id:uid('c'),nome,tel:(m.tel&&r[m.tel]||'').trim(),email:(m.email&&r[m.email]||'').trim(),cpf:(m.cpf&&r[m.cpf]||'').trim(),end:(m.end&&r[m.end]||'').trim(),nasc:'',obs:'Importado de planilha',criado:todayISO(),pets:[]};
   const petNome=(m.pet&&r[m.pet]||'').trim();
   if(petNome)c.pets.push({id:uid('p'),nome:petNome,especie:'cao',raca:'SRD',sexo:'M',porte:'medio',nasc:'',peso:0,cor:'',obs:'',vacinas:[],prontuario:[],alergias:''});
   if(usarHist){const valor=parseMoeda(m.valor&&r[m.valor]);const freq=parseInt(String(m.visitas&&r[m.visitas]||'').replace(/\D/g,''))||0;const ultima=parseData(m.ultima&&r[m.ultima]);if(valor||freq||ultima)c.histImport={valor,freq,ultima};}
   db.clientes.push(c);add++;
 });
 if(!add){toast('Nenhum cliente válido encontrado','err');return;}
 save();closeModal();toast(add+' cliente(s) importado(s) ✓');renderNav();renderClientes();
}

/* ============================================================
   CONTAS & FORMAS DE RECEBIMENTO
   ============================================================ */
function saldoConta(ct){
 let disp=ct.saldoInicial||0,aLiberar=0;
 (db.financeiro||[]).filter(f=>f.contaId===ct.id&&f.pago).forEach(f=>{
   const v=f.tipo==='receita'?(f.liquido!=null?f.liquido:f.valor):-(f.valor);
   if(f.tipo==='receita'&&f.liberacao&&f.liberacao>todayISO())aLiberar+=v;else disp+=v;
 });
 return {disp,aLiberar,total:disp+aLiberar};
}
function novaConta(id){
 const c=id?contaOf(id):null;
 const body=`<div class="field"><label>Nome da conta <span class="req">*</span></label><input class="inp" id="ctNome" value="${c?c.nome.replace(/"/g,'&quot;'):''}" placeholder="Ex: C6 Bank, Stone, Caixa"></div>
   <div class="frow"><div class="field"><label>Tipo</label><select class="sel" id="ctTipo">${Object.entries(TIPO_CONTA).map(([k,v])=>`<option value="${k}" ${c&&c.tipo===k?'selected':''}>${v.lbl}</option>`).join('')}</select></div>
   <div class="field"><label>Saldo inicial</label><input class="inp" type="number" step="0.01" id="ctSaldo" value="${c?(c.saldoInicial||0):0}"></div></div>`;
 openModal({title:id?'Editar conta':'Nova conta',body,foot:`<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>${id?`<button class="btn btn-ghost" style="color:var(--danger);margin-right:auto" onclick="excluirConta('${id}')">${ic('trash',13)} Excluir</button>`:''}<button class="btn btn-primary" onclick="salvarConta(${id?"'"+id+"'":'null'})">${ic('check',15)} Salvar</button>`});
}
function salvarConta(id){
 const nome=$('#ctNome').value.trim();if(!nome){toast('Informe o nome','err');return;}
 const dados={nome,tipo:$('#ctTipo').value,saldoInicial:parseFloat($('#ctSaldo').value)||0};
 let ctRef;if(id){ctRef=contaOf(id);Object.assign(ctRef,dados);}else{ctRef={id:uid('ct'),...dados};db.contas.push(ctRef);}
 save();persistirConta(ctRef);closeModal();toast('Conta salva ✓');(curView==='config'?renderConfig():renderFinanceiro());
}
function excluirConta(id){
 if((db.formasPag||[]).some(f=>f.contaId===id)){toast('Há formas usando esta conta. Edite-as antes.','err');return;}
 if(!confirm('Excluir esta conta?'))return;
 db.contas=db.contas.filter(c=>c.id!==id);save();removerConta(id);closeModal();toast('Conta excluída');(curView==='config'?renderConfig():renderFinanceiro());
}
function novaForma(id){
 const f=id?formaOf(id):null;const tipo=f?f.tipo:'pix';const maxP=f&&f.maxParcelas?f.maxParcelas:12;
 const gridParc=[];for(let n=1;n<=12;n++){gridParc.push(`<div class="field" style="margin:0"><label style="font-size:11px">${n}x</label><input class="inp" style="padding:7px 8px" type="number" step="0.01" data-parc="${n}" value="${f?taxaParcela(f,n):(3.19+(n-1)*0.79).toFixed(2)}"></div>`);}
 const body=`<div class="field"><label>Nome da forma <span class="req">*</span></label><input class="inp" id="fpNome" value="${f?f.nome.replace(/"/g,'&quot;'):''}" placeholder="Ex: Pix C6 Bank, Maquininha Stone"></div>
   <div class="frow"><div class="field"><label>Tipo</label><select class="sel" id="fpTipo" onchange="fpToggleParc()">${Object.entries(TIPO_FORMA).map(([k,v])=>`<option value="${k}" ${tipo===k?'selected':''}>${v.lbl}</option>`).join('')}</select></div>
   <div class="field"><label>Cai na conta</label><select class="sel" id="fpConta">${db.contas.map(c=>`<option value="${c.id}" ${f&&f.contaId===c.id?'selected':''}>${c.nome}</option>`).join('')}</select></div></div>
   <div class="frow"><div class="field"><label>Taxa à vista (%)</label><input class="inp" type="number" step="0.01" id="fpTaxa" value="${f?(f.taxa||0):0}" placeholder="ex: 3.19"></div>
   <div class="field"><label>Prazo p/ liberar (dias)</label><input class="inp" type="number" id="fpPrazo" value="${f?(f.prazoDias||0):0}" placeholder="ex: 30"></div></div>
   <div id="fpParcBox" style="${tipo==='credito'?'':'display:none'}">
     <div class="field" style="margin-bottom:6px"><label>Parcelas aceitas <span class="req">*</span></label><input class="inp" type="number" id="fpMaxParc" min="1" max="12" value="${maxP}" style="max-width:120px"></div>
     <label style="font-size:12.5px;font-weight:600;color:var(--ink-2)">Taxa da maquininha por parcela (%)</label>
     <div id="fpGrid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:8px">${gridParc.join('')}</div>
     <div class="t-sub" style="margin-top:8px;display:flex;align-items:center;gap:6px">${ic('alert',13)} Cada parcela libera ~30 dias após a anterior, com a taxa correspondente descontada.</div>
   </div>`;
 openModal({title:id?'Editar forma':'Nova forma de recebimento',body,size:'wide',foot:`<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="salvarForma(${id?"'"+id+"'":'null'})">${ic('check',15)} Salvar</button>`});
}
function fpToggleParc(){const t=$('#fpTipo').value;const box=$('#fpParcBox');if(box)box.style.display=t==='credito'?'':'none';}
function salvarForma(id){
 const nome=$('#fpNome').value.trim();if(!nome){toast('Informe o nome','err');return;}
 const tipo=$('#fpTipo').value;
 const dados={nome,tipo,contaId:$('#fpConta').value,taxa:parseFloat($('#fpTaxa').value)||0,prazoDias:parseInt($('#fpPrazo').value)||0,ativo:true};
 if(tipo==='credito'){dados.maxParcelas=Math.min(12,Math.max(1,parseInt($('#fpMaxParc').value)||12));dados.taxasParcelas=$$('#fpGrid input[data-parc]').map(i=>parseFloat(i.value)||0);}
 let fpRef;if(id){fpRef=formaOf(id);Object.assign(fpRef,dados);}else{fpRef={id:uid('fp'),...dados};db.formasPag.push(fpRef);}
 save();persistirForma(fpRef);closeModal();toast('Forma salva ✓');(curView==='config'?renderConfig():renderFinanceiro());
}
function excluirForma(id){if(!confirm('Excluir esta forma de recebimento?'))return;db.formasPag=db.formasPag.filter(f=>f.id!==id);save();removerForma(id);toast('Forma excluída');(curView==='config'?renderConfig():renderFinanceiro());}
function receberRecebivel(id){const f=db.financeiro.find(x=>x.id===id);if(!f)return;f.liberacao=todayISO();save();persistirFinanceiro(f);toast('Recebível liberado na conta ✓');(curView==='config'?renderConfig():renderFinanceiro());}

</script>
</body>
